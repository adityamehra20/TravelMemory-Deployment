# TravelMemory - Nginx reverse proxy only (Pattern B)
# Use on a backend-only EC2 instance: forwards all port-80 traffic to Node on 3000.
#
# Install:
#   sudo cp reverse-proxy.conf /etc/nginx/sites-available/travelmemory
#   sudo ln -s /etc/nginx/sites-available/travelmemory /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl restart nginx

server {
    listen 80;
    server_name _;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
