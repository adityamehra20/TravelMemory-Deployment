# TravelMemory - Nginx site config (Pattern A)
# Serves the React production build AND reverse-proxies /api -> Node backend (port 3000).
#
# Install:
#   sudo cp travelmemory.conf /etc/nginx/sites-available/travelmemory
#   sudo ln -s /etc/nginx/sites-available/travelmemory /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl restart nginx

server {
    listen 80;
    server_name _;

    # Path to the React production build (output of `npm run build`)
    root /home/ubuntu/TravelMemory/frontend/build;
    index index.html;

    # Serve the SPA; fall back to index.html for client-side routes
    location / {
        try_files $uri /index.html;
    }

    # Reverse-proxy API calls to the Node backend running on port 3000.
    # With this config set REACT_APP_BACKEND_URL=/api in the frontend .env.
    location /api/ {
        proxy_pass http://localhost:3000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
